name: Publish Test Report

# Runs the suite and publishes the Playwright HTML report to GitHub Pages.
# This is intentionally SEPARATE from ci.yml so report publishing never
# affects the CI status badge.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # continue-on-error so the report is published even when a test fails —
      # a report of failures is still useful to view.
      - name: Run tests
        run: npx playwright test
        continue-on-error: true

      - name: Upload HTML report as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
